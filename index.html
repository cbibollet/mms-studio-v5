<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MMS Studio v8.0 — Mode Expert</title>
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        :root { --blue: #1877F2; --green: #42b72a; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #1c1e21; }
        .header { background: var(--blue); padding: 15px 25px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #ff4d4d; display: inline-block; margin-right: 8px; }
        .dot.online { background: #00e676; box-shadow: 0 0 10px #00e676; }
        .tabs { background: white; display: flex; border-bottom: 1px solid #ddd; }
        .tab { padding: 15px 25px; cursor: pointer; font-weight: bold; color: #65676b; }
        .tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        .studio-box { background: white; padding: 30px; border-radius: 15px; border: 1px solid #ddd; text-align: center; }
        .drop-zone { border: 3px dashed var(--blue); padding: 50px; border-radius: 15px; background: #f0f7ff; cursor: pointer; position: relative; }
        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        canvas { width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; background: var(--green); color: white; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1>MMS Studio v8.0 — Mathias Marine</h1>
    <div style="background: rgba(0,0,0,0.2); padding: 8px 15px; border-radius: 20px; font-size: 12px;">
        <div id="ia-dot" class="dot"></div> <span id="ia-txt">Connexion Expert IA...</span>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="go('studio')">🎨 Studio IA</div>
    <div class="tab" onclick="go('inv')">📦 Inventaire</div>
</div>

<div class="container">
    <div id="sec-studio" class="section active">
        <div class="studio-box">
            <div class="drop-zone">
                <input type="file" id="imgIn" accept="image/*">
                <h3>📸 Glisse une photo produit</h3>
                <p>Le mode Expert Service Worker est activé.</p>
            </div>
            <div id="loading" style="display:none; margin-top:20px; font-weight:bold; color:var(--blue);">L'IA travaille à pleine puissance...</div>
            <canvas id="cvs"></canvas>
            <button id="dl" class="btn" style="display:none" onclick="download()">💾 Télécharger (PNG Fond Blanc)</button>
        </div>
    </div>
    
    <div id="sec-inv" class="section">
        <div class="studio-box">
            <p>Veuillez charger votre fichier Excel via le bouton (à venir).</p>
        </div>
    </div>
</div>

<script>
    // --- WATCHDOG IA ---
    function checkIA() {
        if (typeof imglyRemoveBackground !== 'undefined') {
            document.getElementById('ia-dot').classList.add('online');
            document.getElementById('ia-txt').textContent = "Expert IA Connecté (Hautes Performances)";
        } else { setTimeout(checkIA, 1000); }
    }
    checkIA();

    // --- STUDIO IA ---
    document.getElementById('imgIn').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('loading').style.display = 'block';
        try {
            // Ici, l'IA va utiliser le SharedArrayBuffer car le Service Worker a ouvert les vannes
            const blob = await imglyRemoveBackground(file, {
                publicPath: "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/"
            });
            const img = new Image();
            img.onload = () => {
                const cvs = document.getElementById('cvs');
                cvs.width = img.width; cvs.height = img.height;
                const ctx = cvs.getContext('2d');
                ctx.fillStyle = "white"; ctx.fillRect(0,0,cvs.width,cvs.height);
                ctx.drawImage(img, 0, 0);
                cvs.style.display = 'block';
                document.getElementById('dl').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            };
            img.src = URL.createObjectURL(blob);
        } catch(err) { alert("Erreur : " + err.message); }
    });

    function download() {
        const a = document.createElement('a'); a.download = "MMS-Marketplace.png";
        a.href = document.getElementById('cvs').toDataURL(); a.click();
    }

    function go(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
        event.target.classList.add('active');
    }
</script>
</body>
</html>
