<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMS Studio v9.0 — Mode API</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --blue: #1877F2; --green: #42b72a; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #1c1e21; }
        .header { background: var(--blue); padding: 15px 25px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .status-pill { background: #00e676; padding: 6px 15px; border-radius: 20px; font-size: 11px; color: #004d40; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .tabs { background: white; display: flex; border-bottom: 1px solid #ddd; }
        .tab { padding: 15px 25px; cursor: pointer; font-weight: bold; color: #65676b; }
        .tab.active { color: var(--blue); border-bottom: 3px solid var(--blue); }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 15px; border: 1px solid #ddd; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .api-input { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ccc; text-align: center; }
        .drop-zone { border: 3px dashed var(--blue); padding: 40px; border-radius: 15px; background: #f0f7ff; cursor: pointer; position: relative; }
        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        #res-img { max-width: 100%; margin-top: 20px; border-radius: 10px; display: none; border: 1px solid #ddd; }
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; background: var(--green); color: white; margin-top: 15px; width: 100%; }
        .btn-blue { background: var(--blue); margin-top: 0; width: auto; }
    </style>
</head>
<body>

<div class="header">
    <h1>MMS STUDIO — Mathias Marine Sport</h1>
    <div class="status-pill">● Mode API Activé (Stable)</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="go('studio')">🎨 Studio IA</div>
    <div class="tab" onclick="go('dash')">📊 Dashboard</div>
    <div class="tab" onclick="go('inv')">📦 Inventaire</div>
</div>

<div class="container">
    <div id="sec-studio" class="section active">
        <div class="card">
            <h3>Configuration de l'IA</h3>
            <p style="font-size: 12px; margin-bottom: 10px; color: #666;">Colle ta clé Remove.bg ici (Gratuit 50/mois)</p>
            <input type="password" id="apiKey" class="api-input" placeholder="Colle ta clé API ici...">
            
            <div class="drop-zone">
                <input type="file" id="imgIn" accept="image/*">
                <h3>📸 Glisse ta photo produit</h3>
                <p>Détourage instantané via Cloud API</p>
            </div>
            
            <div id="loading" style="display:none; margin-top:20px; font-weight:bold; color:var(--blue);">Traitement par l'IA en cours...</div>
            <img id="res-img" src="" alt="Résultat">
            <a id="dl-link" style="display:none" class="btn">💾 Télécharger la photo (PNG)</a>
        </div>
    </div>

    <div id="sec-dash" class="section">
        <div class="card">
            <label class="btn btn-blue">📁 Importer Excel <input type="file" id="xlIn" accept=".xlsx,.xls" style="display:none"></label>
            <div id="stats" style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        </div>
    </div>

    <div id="sec-inv" class="section">
        <div class="card">
            <input type="text" id="search" placeholder="Rechercher SKU..." style="width:100%; padding:10px; margin-bottom:10px;">
            <div id="list" style="text-align:left; font-size:12px;"></div>
        </div>
    </div>
</div>

<script>
    let db = [];

    // --- LOGIQUE IA VIA API ---
    document.getElementById('imgIn').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const key = document.getElementById('apiKey').value;
        
        if(!key) { alert("Entre ta clé API d'abord !"); return; }
        if(!file) return;

        document.getElementById('loading').style.display = 'block';
        document.getElementById('res-img').style.display = 'none';

        const formData = new FormData();
        formData.append('image_file', file);
        formData.append('size', 'auto');

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': key },
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const img = document.getElementById('res-img');
                img.src = url;
                img.style.display = 'block';
                
                const dl = document.getElementById('dl-link');
                dl.href = url;
                dl.download = "MMS-Produit.png";
                dl.style.display = 'block';
            } else {
                alert("Erreur API : Vérifie ta clé ou ton quota.");
            }
        } catch (err) {
            alert("Erreur de connexion à l'IA.");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    });

    // --- LOGIQUE EXCEL ---
    document.getElementById('xlIn').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wb = XLSX.read(ev.target.result, {type: 'array'});
            const ws = wb.Sheets['_Données'];
            const rows = XLSX.utils.sheet_to_json(ws, {header: 1});
            db = rows.slice(1).map(r => ({ sku: r[1], desc: r[2], cout: r[7], marge: r[9] }));
            render();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function render() {
        const total = db.reduce((s,p) => s + (p.cout || 0), 0);
        document.getElementById('stats').innerHTML = `
            <div class="card" style="background:#e3f2fd"><b>Valeur Stock</b><br>${total.toFixed(2)}$</div>
            <div class="card" style="background:#e8f5e9"><b>Nb Articles</b><br>${db.length}</div>
        `;
    }

    function go(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
        event.target.classList.add('active');
    }
</script>
</body>
</html>
